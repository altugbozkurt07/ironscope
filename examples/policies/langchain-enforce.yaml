ironscope:
  agents:
    - pid: 12345  # replace with the agent process PID

  unknown_tool_policy: allow
  resolver_error_policy: deny
  agent_child_scope: protect_only_tool_children
  default_tool_policy: allow

  tools:
    - name: read_file
      fs:
        deny:
          - /etc/passwd
    - name: shell
      exec:
        deny:
          - /usr/bin/id
    - name: write_note
      fs:
        deny:
          - /etc/shadow


  mode: enforce
